# This deployment is designed to fail in order to view the CrashLoopBackoff status
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: test-deploy
  name: test-deploy
spec:
  replicas: 10
  selector:
    matchLabels:
      app: test-deploy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 3
      maxSurge: 1
  template:
    metadata:
      labels:
        app: test-deploy
    spec:
      containers:
      - image: httpd:alpine3.18
        name: httpd
        command: ["/bin/sh", "-c"] # Alpine uses sh, not bash
        args: ["sleep 5; exit 1"] # This will always run therefore always making pods fail. 
